<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your movie ticket booking history on CineVault.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">

<body>
  <!-- Navbar -->
  <nav class="cv-navbar scrolled" id="mainNavbar">
    <div class="container">
      <a href="/pages/index.html" class="cv-navbar-brand">
        <div class="brand-icon">🎬</div>
        <span>CineVault</span>
      </a>
      <button class="cv-nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="cv-nav-links">
        <li><a href="/pages/index.html">Home</a></li>
        <li><a href="/pages/movies.html">Movies</a></li>
        <li><a href="/pages/my-bookings.html" class="active">My Bookings</a></li>
      </ul>
      <div class="cv-nav-right"></div>
    </div>
  </nav>

  <!-- Bookings Page -->
  <section style="padding-top: 100px; padding-bottom: 60px;">
    <div class="cv-container">
      <div class="cv-section-header cv-fade-in-up" style="opacity: 0;">
        <h1><i class="bi bi-ticket-perforated"></i> My Bookings</h1>
      </div>

      <!-- Bookings List -->
      <div id="bookingsList">
        <!-- Loading skeleton -->
        <div class="cv-booking-card">
          <div class="cv-skeleton" style="width: 80px; height: 120px; border-radius: 10px;"></div>
          <div class="booking-info" style="flex: 1;">
            <div class="cv-skeleton" style="height: 20px; width: 60%; margin-bottom: 12px;"></div>
            <div class="cv-skeleton" style="height: 14px; width: 80%; margin-bottom: 8px;"></div>
            <div class="cv-skeleton" style="height: 14px; width: 40%;"></div>
          </div>
        </div>
        <div class="cv-booking-card">
          <div class="cv-skeleton" style="width: 80px; height: 120px; border-radius: 10px;"></div>
          <div class="booking-info" style="flex: 1;">
            <div class="cv-skeleton" style="height: 20px; width: 50%; margin-bottom: 12px;"></div>
            <div class="cv-skeleton" style="height: 14px; width: 70%; margin-bottom: 8px;"></div>
            <div class="cv-skeleton" style="height: 14px; width: 35%;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="cv-footer">
    <div class="cv-container">
      <div class="cv-footer-bottom" style="border-top: none; padding-top: 0;">
        <span>© 2026 CineVault. All rights reserved.</span>
        <div style="display: flex; gap: 16px;">
          <a href="#"><i class="bi bi-twitter-x"></i></a>
          <a href="#"><i class="bi bi-instagram"></i></a>
          <a href="#"><i class="bi bi-facebook"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/booking.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadMyBookings);
  </script>

</html>
