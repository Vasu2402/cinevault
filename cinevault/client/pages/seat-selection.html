<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Select your seats for the movie — interactive real-time seat grid on CineVault.">
  <title>Select Seats — CineVault</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="cv-navbar scrolled" id="mainNavbar">
    <div class="container">
      <a href="/pages/index.html" class="cv-navbar-brand">
        <div class="brand-icon">🎬</div>
        <span>CineVault</span>
      </a>
      <button class="cv-nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="cv-nav-links">
        <li><a href="/pages/index.html">Home</a></li>
        <li><a href="/pages/movies.html">Movies</a></li>
        <li><a href="/pages/my-bookings.html">My Bookings</a></li>
      </ul>
      <div class="cv-nav-right"></div>
    </div>
  </nav>

  <!-- Seat Selection Page -->
  <section style="padding-top: 90px; padding-bottom: 100px;">
    <div class="cv-container">
      <!-- Movie Info Bar -->
      <div class="cv-card" style="padding: 20px; margin-bottom: 32px;">
        <div class="row align-items-center">
          <div class="col-auto">
            <img id="moviePoster" src="" alt="" style="width: 60px; height: 80px; border-radius: 8px; object-fit: cover;">
          </div>
          <div class="col">
            <h3 id="movieTitle" style="margin-bottom: 4px; font-size: 1.15rem;"></h3>
            <div style="display: flex; gap: 16px; font-size: 0.85rem; color: var(--cv-text-secondary);">
              <span id="movieGenre"></span>
              <span><i class="bi bi-clock"></i> <span id="movieDuration"></span></span>
            </div>
            <div style="font-size: 0.82rem; color: var(--cv-text-muted); margin-top: 4px;" id="showInfo"></div>
          </div>
        </div>
      </div>

      <!-- Screen Indicator -->
      <div class="cv-screen cv-fade-in-down" style="opacity: 0;">
        <div class="cv-screen-shape"></div>
        <div class="cv-screen-label">Screen this way</div>
      </div>

      <!-- Seat Type Labels -->
      <div style="text-align: center; margin-bottom: 20px;">
        <span class="cv-badge cv-badge-gold" style="margin-right: 8px;">Rows A-B: Premium</span>
        <span class="cv-badge cv-badge-muted">Rows C-J: Standard</span>
      </div>

      <!-- Seat Grid -->
      <div class="cv-seat-grid cv-fade-in" style="opacity: 0;" id="seatGrid">
        <div class="cv-loading-spinner" style="margin: 40px auto;"></div>
      </div>

      <!-- Legend -->
      <div class="cv-seat-legend cv-fade-in-up" style="opacity: 0;">
        <div class="cv-seat-legend-item">
          <div class="swatch available"></div>
          <span>Available</span>
        </div>
        <div class="cv-seat-legend-item">
          <div class="swatch selected"></div>
          <span>Selected</span>
        </div>
        <div class="cv-seat-legend-item">
          <div class="swatch booked"></div>
          <span>Booked</span>
        </div>
        <div class="cv-seat-legend-item">
          <div class="swatch locked"></div>
          <span>Locked</span>
        </div>
        <div class="cv-seat-legend-item">
          <div class="swatch premium"></div>
          <span>Premium</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Sticky Summary Bar -->
  <div class="cv-summary-bar" id="summaryBar">
    <div class="container">
      <div class="cv-summary-info">
        <div class="count" id="selectedCount"><strong>0</strong> seats selected</div>
        <div class="total" id="totalPrice">₹0</div>
      </div>
      <button class="cv-btn cv-btn-primary cv-btn-lg cv-ripple" onclick="proceedToCheckout()">
        Proceed <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/socket.js"></script>
  <script src="/assets/js/seat-selection.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initSeatSelection();
    });

    // Cleanup on page leave
    window.addEventListener('beforeunload', () => {
      const showId = getUrlParam('showId');
      if (showId) leaveShow(showId);
    });
  </script>
</body>
</html>
