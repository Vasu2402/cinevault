<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Movie details, ratings, cast, and show times on CineVault.">
  <title>Movie Details — CineVault</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="cv-navbar" id="mainNavbar">
    <div class="container">
      <a href="/pages/index.html" class="cv-navbar-brand">
        <div class="brand-icon">🎬</div>
        <span>CineVault</span>
      </a>
      <button class="cv-nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="cv-nav-links">
        <li><a href="/pages/index.html">Home</a></li>
        <li><a href="/pages/movies.html" class="active">Movies</a></li>
        <li><a href="/pages/my-bookings.html">My Bookings</a></li>
      </ul>
      <div class="cv-nav-right"></div>
    </div>
  </nav>

  <!-- Movie Detail Hero -->
  <section class="cv-detail-hero" id="detailHero">
    <div class="backdrop" id="movieBackdrop"></div>
    <div class="overlay"></div>
    <div class="content">
      <div class="cv-container">
        <div class="row align-items-end" style="min-height: 350px;">
          <div class="col-lg-3 col-md-4 mb-4 cv-fade-in-left" style="opacity: 0;">
            <div class="cv-detail-poster">
              <img id="detailPoster" src="" alt="Movie Poster">
            </div>
          </div>
          <div class="col-lg-9 col-md-8 cv-fade-in-right" style="opacity: 0;">
            <div style="margin-bottom: 12px;">
              <span class="cv-badge cv-badge-primary" id="detailGenre"></span>
              <span class="cv-badge cv-badge-muted" id="detailLanguage"></span>
            </div>
            <h1 id="detailTitle" style="margin-bottom: 12px;"></h1>
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;">
              <div class="cv-rating-badge" id="detailRating">
                <i class="bi bi-star-fill"></i> <span></span>
              </div>
              <span style="color: var(--cv-text-secondary); display: flex; align-items: center; gap: 4px;">
                <i class="bi bi-clock"></i> <span id="detailDuration"></span>
              </span>
              <span style="color: var(--cv-text-secondary); display: flex; align-items: center; gap: 4px;">
                <i class="bi bi-calendar3"></i> <span id="detailRelease"></span>
              </span>
            </div>
            <p id="detailDescription" style="max-width: 600px; margin-bottom: 16px; font-size: 0.95rem;"></p>
            <div style="margin-bottom: 8px;">
              <span style="color: var(--cv-text-muted); font-size: 0.85rem;">Director: </span>
              <span style="color: var(--cv-text-primary); font-size: 0.85rem; font-weight: 500;" id="detailDirector"></span>
            </div>
            <div>
              <span style="color: var(--cv-text-muted); font-size: 0.85rem;">Cast: </span>
              <span style="color: var(--cv-text-primary); font-size: 0.85rem;" id="detailCast"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Show Times -->
  <section class="cv-section" style="padding-top: 20px;">
    <div class="cv-container">
      <h2 style="margin-bottom: 24px;" data-animate>🎟️ Select Show</h2>

      <!-- Date Tabs -->
      <div class="cv-date-tabs" id="dateTabs">
        <!-- Populated by JS -->
      </div>

      <!-- Show Time Slots -->
      <div id="showsByDate">
        <div class="cv-loading-spinner" style="margin: 40px auto;"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="cv-footer">
    <div class="cv-container">
      <div class="cv-footer-bottom" style="border-top: none; padding-top: 0;">
        <span>© 2026 CineVault. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    let movieData = null;
    let allShows = [];
    let selectedDate = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const id = getUrlParam('id');
      if (!id) {
        showToast('Movie not found', 'error');
        setTimeout(() => window.location.href = '/pages/movies.html', 1000);
        return;
      }

      try {
        movieData = await fetchMovieById(id);
        if (!movieData) throw new Error('Movie not found');

        // Populate detail info
        document.title = `${movieData.title} — CineVault`;
        document.getElementById('movieBackdrop').style.backgroundImage = `url('${movieData.poster}')`;
        document.getElementById('detailPoster').src = movieData.poster;
        document.getElementById('detailTitle').textContent = movieData.title;
        document.getElementById('detailGenre').textContent = movieData.genre;
        document.getElementById('detailLanguage').textContent = movieData.language;
        document.getElementById('detailRating').querySelector('span').textContent = `${movieData.rating}/10`;
        document.getElementById('detailDuration').textContent = formatDuration(movieData.duration);
        document.getElementById('detailRelease').textContent = formatDate(movieData.releaseDate);
        document.getElementById('detailDescription').textContent = movieData.description;
        document.getElementById('detailDirector').textContent = movieData.director || 'N/A';
        document.getElementById('detailCast').textContent = movieData.cast || 'N/A';

        // Shows
        allShows = movieData.shows || [];
        buildDateTabs();

      } catch (err) {
        showToast('Failed to load movie: ' + err.message, 'error');
      }
    });

    function buildDateTabs() {
      const dates = [...new Set(allShows.map(s => s.date))].sort();
      const container = document.getElementById('dateTabs');

      if (dates.length === 0) {
        document.getElementById('showsByDate').innerHTML = `
          <div class="cv-empty-state" style="padding: 40px;">
            <div class="icon">📅</div>
            <h3>No shows available</h3>
            <p>Check back later for show times</p>
          </div>
        `;
        container.innerHTML = '';
        return;
      }

      selectedDate = dates[0];

      container.innerHTML = dates.map(d => {
        const info = formatDateShort(d);
        return `
          <button class="cv-date-tab ${d === selectedDate ? 'active' : ''}" onclick="selectDate('${d}')">
            <span class="day">${info.day}</span>
            <span class="num">${info.num}</span>
            <span class="month">${info.month}</span>
          </button>
        `;
      }).join('');

      renderShows();
    }

    function selectDate(date) {
      selectedDate = date;
      document.querySelectorAll('.cv-date-tab').forEach(t =>
        t.classList.toggle('active', t.textContent.includes(formatDateShort(date).num))
      );
      // Re-highlight
      const tabs = document.querySelectorAll('.cv-date-tab');
      const dates = [...new Set(allShows.map(s => s.date))].sort();
      tabs.forEach((tab, i) => tab.classList.toggle('active', dates[i] === date));
      renderShows();
    }

    function renderShows() {
      const container = document.getElementById('showsByDate');
      const shows = allShows.filter(s => s.date === selectedDate);

      // Group by theatre
      const theatreGroups = {};
      shows.forEach(s => {
        const name = s.theatre?.name || `Theatre ${s.theatreId}`;
        if (!theatreGroups[name]) theatreGroups[name] = { info: s.theatre, shows: [] };
        theatreGroups[name].shows.push(s);
      });

      if (Object.keys(theatreGroups).length === 0) {
        container.innerHTML = '<p style="color: var(--cv-text-muted); text-align: center; padding: 20px;">No shows on this date</p>';
        return;
      }

      container.innerHTML = Object.entries(theatreGroups).map(([name, group]) => `
        <div class="cv-card" style="padding: 24px; margin-bottom: 16px;" data-animate>
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
            <div>
              <h4 style="margin-bottom: 4px;">${name}</h4>
              <p style="font-size: 0.82rem; margin: 0;"><i class="bi bi-geo-alt"></i> ${group.info?.location || ''}</p>
            </div>
            <div style="display: flex; gap: 8px;">
              <span class="cv-badge cv-badge-gold">Standard: ${formatCurrency(group.shows[0]?.price)}</span>
              <span class="cv-badge cv-badge-primary">Premium: ${formatCurrency(group.shows[0]?.premiumPrice)}</span>
            </div>
          </div>
          <div class="cv-time-slots">
            ${group.shows.map(s => `
              <button class="cv-time-slot" onclick="goToSeatSelection('${s.id}')">
                ${s.time}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');

      initScrollReveal();
    }

    function goToSeatSelection(showId) {
      window.location.href = `/pages/seat-selection.html?showId=${showId}&movieId=${movieData.id}`;
    }
  </script>
</body>
</html>
